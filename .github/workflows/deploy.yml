name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # QUI INDICHI IL PATH SUL TUO SPAZIO WEB
          server-dir: /public_html/checkupsv  
          # QUI INDICHI COSA CARICARE DAL TUO GITHUB (./ carica tutto)
          local-dir: ./
